<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Autopilot Status</title>
    <style>
        :root {
            --hsr-blue: #00e5ff;
            --hsr-dark: #020617;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .glass-scanner {
            position: absolute;
            top: -50vh;
            left: -40%;
            width: 220px;
            height: 200vh;
            background: rgba(255, 255, 255, 0.05);
            filter: invert(100%);
            backdrop-filter: blur(0px) saturate(10);
            -webkit-backdrop-filter: blur(0px) saturate(10);
            border-left: 4px solid rgba(0, 229, 255, 0.3);
            border-right: 2px solid rgba(255, 50, 50, 0.3);
            box-shadow: -5px 0 15px rgba(0, 229, 255, 0.1), 5px 0 15px rgba(255, 50, 50, 0.1);
            transform: rotate(10deg);
            animation: sweep 10s cubic-bezier(0.4, 0, 0.2, 0.1) infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes sweep {
            0% {
                left: -50%;
                opacity: 0;
            }

            10% {
                opacity: 1;
            }

            90% {
                opacity: 1;
            }

            100% {
                left: 150%;
                opacity: 0;
            }
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            z-index: 5;
        }

        .progress-container {
            width: 90%;
            max-width: 800px;
            position: relative;
        }

        .time-text {
            font-family: monospace;
            font-size: 3.5rem;
            font-weight: bold;
            letter-spacing: 5px;
            color: white;
            display: none;
            /* Hidden by default */
        }

        /* Offset Corner Accents from Image */
        .corner-accent {
            position: absolute;
            width: 1.5rem;
            height: 1.5rem;
            border-color: white;
            border-style: solid;
            z-index: 6;
        }

        .top-left {
            top: -15px;
            left: -15px;
            border-width: 4px 0 0 4px;
        }

        .top-right {
            top: -15px;
            right: -15px;
            border-width: 4px 4px 0 0;
        }

        .bottom-left {
            bottom: -15px;
            left: -15px;
            border-width: 0 0 4px 4px;
        }

        .bottom-right {
            bottom: -15px;
            right: -15px;
            border-width: 0 4px 4px 0;
        }

        .progress-outer {
            background-color: rgba(0, 0, 0, 0.8);
            position: relative;
            display: block;
            flex-direction: column;
        }

        .bar-section {
            border: 2px solid white;
            padding: 1rem;
            border-bottom: 2px solid white;
            position: relative;
        }

        .progress-inner {
            position: relative;
            height: 2.5rem;
            width: 100%;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right,
                    rgba(255, 255, 255, 0.1),
                    rgba(255, 255, 255, 0.8),
                    rgba(255, 255, 255, 1));
            transition: width 0.3s ease-out;
            position: relative;
        }

        .scanline {
            position: absolute;
            inset: 0;
            background: linear-gradient(transparent 49%,
                    rgba(255, 255, 255, 0.1) 50%,
                    transparent 51%);
            animation: scanline 2s linear infinite;
            background-size: 100% 12px;
            pointer-events: none;
        }

        @keyframes scanline {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 0 100%;
            }
        }

        .percentage {
            position: absolute;
            right: 0.5rem;
            top: 50%;
            transform: translateY(-50%);
            background: black;
            padding: 2px 8px;
            border: 1px solid white;
            color: white;
            font-family: monospace;
            font-size: 0.9rem;
            z-index: 2;
        }

        .info-section {
            border: 2px solid white;
            margin-top: 1rem;
            padding: 0.8rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            text-align: left;
            font-family: monospace;
            font-size: 1.1rem;
            width: 40%;
            letter-spacing: 2px;
        }

        .corner-spinner {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 120px;
            height: 120px;
            z-index: 1;
            animation: spin 3s linear infinite;
        }

        .plus-shape {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .plus-shape::before,
        .plus-shape::after {
            content: '';
            position: absolute;
            background: white;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .plus-shape::before {
            width: 36px;
            height: 100%;
        }

        .plus-shape::after {
            width: 100%;
            height: 36px;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        #particles {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .star {
            position: absolute;
            width: 36px;
            height: 6px;
            background: white;
            border-radius: 0%;
            animation: moveStar linear infinite;
        }

        @keyframes moveStar {
            from {
                left: 110%;
            }

            to {
                left: -10%;
            }
        }
    </style>
</head>

<body>
    <div id="particles"></div>
    <div class="glass-scanner"></div>

    <div class="corner-spinner">
        <div class="plus-shape"></div>
    </div>

    <div class="container">
        <div class="progress-container">
            <div class="corner-accent top-left"></div>
            <div class="corner-accent top-right"></div>
            <div class="corner-accent bottom-left"></div>
            <div class="corner-accent bottom-right"></div>

            <div class="progress-outer">
                <div class="bar-section">
                    <div class="progress-inner">
                        <div class="progress-fill" id="progress"></div>
                        <div class="scanline"></div>
                        <div class="percentage" id="percent-text">0%</div>
                    </div>
                </div>
                <div class="info-section" id="status">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const CLOCK_MODE = true; // Toggle this variable

        function init() {
            createStars();
            const progressInner = document.querySelector('.progress-inner');
            const statusText = document.getElementById('status');
            const timeDisplay = document.createElement('div');

            timeDisplay.className = 'time-text';
            timeDisplay.id = 'time-val';
            progressInner.appendChild(timeDisplay);

            if (CLOCK_MODE) {
                document.getElementById('progress').style.display = 'none';
                document.getElementById('percent-text').style.display = 'none';

                const inner = document.querySelector('.progress-inner');
                inner.style.height = 'auto';
                inner.style.background = 'transparent';
                inner.style.border = 'none';

                const bar = document.querySelector('.bar-section');
                bar.style.height = 'auto';
                bar.style.minHeight = '4rem';
                bar.style.display = 'flex';
                bar.style.alignItems = 'center';
                bar.style.justifyContent = 'center';

                timeDisplay.style.display = 'block';
                timeDisplay.style.fontSize = '2.5rem';

                const info = document.getElementById('status');
                info.style.width = 'fit-content';
                info.style.padding = '0.8rem 2rem';

                updateClock();
            }
        }

        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('time-val').innerText = `${h}:${m} //Autopilot standby`;

            const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
            const months = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];
            document.getElementById('status').innerText = `${days[now.getDay()]} ${months[now.getMonth()]} ${now.getDate()} ${now.getFullYear()}`;

            requestAnimationFrame(updateClock);
        }

        function updateLoading(percent) {
            const progressBar = document.getElementById('progress');
            const percentText = document.getElementById('percent-text');

            if (percent < 100) {
                percent += Math.random() * 0.5;
                const display = Math.min(Math.round(percent), 100);
                progressBar.style.width = display + '%';
                percentText.innerText = display + '%';
                setTimeout(() => updateLoading(percent), 50);
            } else {
                setTimeout(() => updateLoading(0), 3000);
            }
        }

        function createStars() {
            const p = document.getElementById('particles');
            for (let i = 0; i < 80; i++) {
                const s = document.createElement('div');
                s.className = 'star';
                const duration = 8 + Math.random() * 12;
                Object.assign(s.style, {
                    top: Math.random() * 100 + '%',
                    opacity: Math.random() * 0.9,
                    animationDuration: duration + 's',
                    animationDelay: -(Math.random() * duration) + 's'
                });
                p.appendChild(s);
            }
        }

        window.onload = init;
    </script>
</body>

</html>
